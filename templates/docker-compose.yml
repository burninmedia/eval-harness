# Reference stack — SQLite on tmpfs so a non-root USER can create the DB without an init chown.
services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      SESSION_SECRET: ${SESSION_SECRET:-change-me-for-local-docker-only}
      DB_PATH: /data/app.sqlite
    tmpfs:
      - /data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
